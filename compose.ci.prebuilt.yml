services:
  backend:
    image: ${BACKEND_IMAGE}
    pull_policy: always
  reverse-proxy:
    image: ${PROXY_IMAGE}
    pull_policy: always
  frontend:
    image: ${FRONTEND_IMAGE}
    pull_policy: always
    environment:
      - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID}
      - VITE_OIDC_ROOT_URL=${VITE_OIDC_ROOT_URL}
