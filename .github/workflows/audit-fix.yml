---
name: Automated Dependency Audit

concurrency:
  group: audit-fix-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    outputs:
      has-changes: ${{ steps.check-changes.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          pnpm install --filter @thunderbird/tbpro-add-on && lerna run bootstrap

      - name: Run pnpm audit --fix
        id: audit-fix
        run: |
          echo "Running pnpm audit --fix..."
          pnpm audit --fix || true
          echo "Audit fix completed"
          pnpm install --no-frozen-lockfile

      - name: Bump package versions (patch)
        run: node scripts/bump-versions.js

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --exit-code; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump patch versions and fix security vulnerabilities"
          branch: automated/dependency-audit-${{ github.run_number }}
          delete-branch: true
          title: "[Automated] Fix Security Vulnerabilities"
          body: |
            ## Automated Dependency Audit

            This PR was automatically created by the dependency audit workflow.

            ### Changes
            - Ran `pnpm audit --fix` to address security vulnerabilities
            - Updated `pnpm-lock.yaml` with latest dependency resolutions
            - Bumped patch version on all packages and manifest files (excluding assist) to trigger CI validations

            ### Workflow Details
            - **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - **Triggered**: ${{ github.event_name == 'schedule' && 'Scheduled (Weekly)' || 'Manual' }}
            - **Date**: ${{ github.event.head_commit.timestamp }}

            Please review the changes and merge if appropriate.
          labels: |
            dependencies
            security
            automated
          base: main
          assignees: ${{ github.actor }}
