---
name: deploy-production

concurrency:
  group: deploy-production
  cancel-in-progress: false

on:
  release:
    types:
      - published

permissions:
  packages: read
  contents: read
  id-token: write

jobs:
  backend-deploy-prod-aws:
    environment:
      name: send-prod
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    outputs:
      ecs_deployed: ${{ steps.wait-deployment.outputs.ecs_deployed }}
    steps:
      - name: Check out the code
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        uses: actions/checkout@v4

      - name: Ensure gh CLI is present
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        run: |
          command -v gh >/dev/null 2>&1 || {
            GH_VERSION="2.63.2"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp
            install /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /usr/local/bin/gh
          }
          gh --version

      - name: Download ECR tag artifact
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "ecr_tag.zip" \
            --repo "${{ github.repository }}"

      - name: Configure AWS credentials
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      - name: Retag image
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        id: retag-image
        run: |
          # Gather info
          unzip ecr_tag.zip  # Produces ecr_tag.txt
          source_tag=$(cat ecr_tag.txt)
          cd packages/send/backend
          semver=$(jq -r .version < package.json)
          target_tag="${{ steps.login-ecr.outputs.registry }}/${{ vars.PROJECT }}:$semver"

          # Output the target tag
          echo "target_tag=$target_tag" >> "$GITHUB_OUTPUT"

          # Retag the image and push it
          docker pull "$source_tag"
          docker tag "$source_tag" "$target_tag"
          docker push "$target_tag"

      - name: Configure AWS credentials
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Deploy version-tagged image to prod
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        env:
          PULUMI_ACCESS_TOKEN: "${{ secrets.PULUMI_ACCESS_TOKEN }}"
        run: |
          # Update the PATH to include the right version of Pulumi; this is non-trivial or impossible
          # to do with the GHA workflow "env" settings.
          export PATH="/home/runner/.pulumi/bin:$PATH"

          # Pull the versioned tag from the previous step
          target_tag="${{ steps.retag-image.outputs.target_tag }}"

          # Create a YAML config stump containing only the nested tree leading to the image tag update
          cd packages/send/pulumi
          cat << EOF > newimage.yaml
          resources:
            tb:fargate:FargateClusterWithLogging:
              backend:
                task_definition:
                  container_definitions:
                    backend:
                      image: "$target_tag"
          EOF

          # Use yq to merge the stump into the main config
          yq -i '. *= load("newimage.yaml")' config.prod.yaml
          export PULUMI_CONFIG_PASSPHRASE='${{ secrets.PULUMI_PASSPHRASE_PROD }}'

          # update the service
          pulumi login
          pulumi stack select prod
          TBPULUMI_DISABLE_PROTECTION=True \
            pulumi up -y --diff --target \
            "urn:pulumi:prod::send-suite::tb:fargate:FargateClusterWithLogging\$aws:ecs/taskDefinition:TaskDefinition::send-suite-prod-fargate-taskdef" \
            --target-dependents

      - name: Wait for ECS to update the service
        id: wait-deployment
        if: contains(github.event.release.assets.*.name, 'ecr_tag.zip')
        run: |
          aws ecs wait services-stable --region eu-central-1 --cluster send-suite-prod-fargate --services send-suite-prod-fargate
          echo "ecs_deployed=true" >> "$GITHUB_OUTPUT"

  frontend-deploy-prod-aws:
    environment:
      name: send-prod
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    outputs:
      s3_deployed: ${{ steps.frontend-deploy.outputs.s3_deployed }}
    steps:
      - name: Ensure gh CLI is present
        if: contains(github.event.release.assets.*.name, 'dist-web-prod.zip')
        run: |
          command -v gh >/dev/null 2>&1 || {
            GH_VERSION="2.63.2"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp
            install /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /usr/local/bin/gh
          }
          gh --version

      - name: Download frontend source
        if: contains(github.event.release.assets.*.name, 'dist-web-prod.zip')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "dist-web-prod.zip" \
            --repo "${{ github.repository }}"

      - name: Configure AWS credentials
        if: contains(github.event.release.assets.*.name, 'dist-web-prod.zip')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Deploy to production
        if: contains(github.event.release.assets.*.name, 'dist-web-prod.zip')
        id: frontend-deploy
        run: |
          unzip -d frontend-source dist-web-prod.zip
          cd frontend-source
          aws s3 cp . s3://tb-send-suite-prod-frontend/ --recursive
          echo "s3_deployed=true" >> "$GITHUB_OUTPUT"

  frontend-invalidate-prod-cdn:
    needs: ["frontend-deploy-prod-aws", "backend-deploy-prod-aws"]
    if: ${{ needs.frontend-deploy-prod-aws.outputs.s3_deployed == 'true' && needs.backend-deploy-prod-aws.outputs.ecs_deployed == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: send-prod
    steps:
      - name: Test echo
        run: |
          echo "Invalidating CDN for prod environment"
          date

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Invalidate CDN, prod only
        run: |
          # Invalidate the CDN
          aws cloudfront create-invalidation --distribution-id ${{ vars.PROD_CF_DISTRO_ID }} --paths "/*"

  deploy-addon-prod-atn:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    environment:
      name: send-prod
    steps:
      - name: Find addon XPI asset
        id: find-addon
        if: contains(join(github.event.release.assets.*.name, ','), 'tbpro-addon-prod-')
        run: |
          name=$(jq -r '.release.assets[] | select(.name | test("tbpro-addon-prod-.*\\.xpi")) | .name' "$GITHUB_EVENT_PATH" | head -n1 || true)
          echo "xpi_name=$name" >> "$GITHUB_OUTPUT"

      - name: Check out the code
        if: steps.find-addon.outputs.xpi_name != ''
        uses: actions/checkout@v4

      - name: Ensure gh CLI is present
        if: steps.find-addon.outputs.xpi_name != ''
        run: |
          command -v gh >/dev/null 2>&1 || {
            GH_VERSION="2.63.2"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp
            install /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /usr/local/bin/gh
          }
          gh --version

      - name: Download addon XPI artifact
        if: steps.find-addon.outputs.xpi_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "${{ steps.find-addon.outputs.xpi_name }}" \
            --repo "${{ github.repository }}"

      - name: Deploy addon prod to ATN via web-ext
        if: steps.find-addon.outputs.xpi_name != ''
        continue-on-error: true
        id: web-ext-sign-prod-addon
        uses: kewisch/action-web-ext@v1
        env:
          BASE_URL: https://send.tb.pro
        with:
          cmd: sign
          source: ${{ steps.find-addon.outputs.xpi_name }}
          channel: listed
          apiUrlPrefix: "https://addons.thunderbird.net/api/v4"
          apiKey: ${{ secrets.ATN_API_KEY }}
          apiSecret: ${{ secrets.ATN_API_SECRET }}
