---
name: deploy-stage-and-create-release

concurrency:
  group: deploy-stage
  cancel-in-progress: true

on:
  push:
    # branches:
    #   - main

permissions:
  packages: read
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    env:
      IS_CI_AUTOMATION: "yes"
    outputs:
      backend-changed: ${{ steps.check.outputs.backend-changed }}
      iac-changed: ${{ steps.check.outputs.iac-changed }}
      frontend-changed: ${{ steps.check.outputs.frontend-changed }}
      addon-changed: ${{ steps.check.outputs.addon-changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: check
        with:
          filters: |
            backend-changed:
              - 'packages/send/backend/**'
            iac-changed:
              - 'packages/send/pulumi/**'
              - '.github/workflows/validate.yml'
            frontend-changed:
              - 'packages/send/frontend/**'
            addon-changed:
              - 'packages/addon/**'

  backend-build-stage:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.build-backend.outputs.backend-image }}
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    environment: send-stage
    steps:
      - name: test echo
        run: |
          echo "Building backend with changes: ${{ needs.detect-changes.outputs.backend-changed }} and iac changes: ${{ needs.detect-changes.outputs.iac-changed }}"
          echo $(date)

      - uses: actions/checkout@v4

      - name: Install pnpm and build package
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        id: install-pnpm-build
        run: |
          pnpm install --filter @thunderbird/tbpro-add-on && lerna run bootstrap
          pnpm install --filter send-backend
          lerna run build-image:backend --scope=send-suite

      - name: Configure AWS credentials
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      - name: Build, tag, and push backend image to Amazon ECR
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        id: build-backend
        env:
          ECR_TAG: "${{ steps.login-ecr.outputs.registry }}/${{ vars.PROJECT }}:${{ github.sha }}"
        run: |
          # Build a docker container and push it to ECR so that it can be deployed to ECS.
          docker build -t $ECR_TAG ./packages/send/backend/build
          docker push $ECR_TAG
          echo "backend-image=$ECR_TAG" >> $GITHUB_OUTPUT
          echo -n "$ECR_TAG" > ecr_tag.txt

      - name: Archive the ECR tag
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        id: tag-archive
        uses: actions/upload-artifact@v4
        with:
          name: ecr_tag
          path: ecr_tag.txt

  backend-deploy-stage-aws:
    needs: backend-build-stage
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    environment: send-stage
    steps:
      - uses: actions/checkout@v4
      
      - name: "test echo"
        run: |
          echo "Deploying backend with image ${{ needs.backend-build-stage.outputs.backend-image }}"
          echo $(date)

      - name: Configure AWS credentials
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy new image to stage
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        env:
          ECR_TAG: "${{ needs.backend-build-stage.outputs.backend-image }}"
          PULUMI_ACCESS_TOKEN: "${{ secrets.PULUMI_ACCESS_TOKEN }}"
        run: |
          # Update the PATH to include the right version of Pulumi; this is non-trivial or impossible
          # to do with the GHA workflow "env" settings above.
          export PATH="/home/runner/.pulumi/bin:$PATH"

          cd packages/send/pulumi

          # Create a YAML config stump containing only the nested tree leading to the image tag update
          cat << EOF > newimage.yaml
          resources:
            tb:fargate:FargateClusterWithLogging:
              backend:
                task_definition:
                  container_definitions:
                    backend:
                      image: "$ECR_TAG"
          EOF

          # Use yq to merge the stump into the main config
          yq -i '. *= load("newimage.yaml")' config.stage.yaml

          # Set up the Pulumi environment and update the service
          export PULUMI_CONFIG_PASSPHRASE="${{ secrets.PULUMI_PASSPHRASE_STAGE }}"
          pulumi login
          pulumi stack select stage
          pulumi up -y --diff --target \
            'urn:pulumi:stage::send-suite::tb:fargate:FargateClusterWithLogging$aws:ecs/taskDefinition:TaskDefinition::send-suite-stage-fargate-taskdef' \
            --target-dependents

      - name: Wait for ecs to update the service
        # if: needs.detect-changes.outputs.backend-changed == 'true'
        run: |
          aws ecs wait services-stable --region eu-central-1 --cluster send-suite-stage-fargate --services send-suite-stage-fargate
          echo "ecs_deployed=true" >> $GITHUB_OUTPUT

  frontend-build:
    needs: detect-changes
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: "yes"
    environment: send-stage
    strategy:
      matrix:
        env: ["stage", "prod"]
        include:
          - env: "stage"
            base_url: "https://send-stage.tb.pro"
            send_server_url: "https://send-backend-stage.tb.pro"
            send_client_url: "https://send-stage.tb.pro"
          - env: "prod"
            base_url: "https://send.tb.pro"
            send_server_url: "https://send-backend.tb.pro"
            send_client_url: "https://send.tb.pro"
    steps:
      - name: test echo
        run: |
          echo "Building frontend for environment ${{ matrix.env }} with base URL ${{ matrix.base_url }}"
          echo $(date)

      - uses: actions/checkout@v4

      - name: Install pnpm and build package
        if: needs.detect-changes.outputs.frontend-changed == 'true'
        id: install-pnpm-build
        run: |
          pnpm install --filter @thunderbird/tbpro-add-on && lerna run bootstrap
          pnpm install --filter send-frontend
          lerna run build --scope=send-suite

      # Front end build env configuration
      - name: Create .env file from secrets
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ matrix.env == 'stage' && secrets.VITE_SENTRY_AUTH_TOKEN_STAGE || secrets.VITE_SENTRY_AUTH_TOKEN_PROD }}
          SENTRY_DSN:        ${{ matrix.env == 'stage' && vars.VITE_SENTRY_DSN_STAGE || vars.VITE_SENTRY_DSN_PROD }}
          POSTHOG_KEY:       ${{ matrix.env == 'stage' && secrets.VITE_POSTHOG_PROJECT_KEY_STAGE || secrets.VITE_POSTHOG_PROJECT_KEY_PROD }}
          POSTHOG_HOST:      ${{ matrix.env == 'stage' && vars.VITE_POSTHOG_HOST_STAGE || vars.VITE_POSTHOG_HOST_PROD }}
          OIDC_CLIENT_ID:    ${{ matrix.env == 'stage' && secrets.VITE_OIDC_CLIENT_ID_STAGE || secrets.VITE_OIDC_CLIENT_ID_PROD }}
          OIDC_ROOT_URL:     ${{ matrix.env == 'stage' && secrets.VITE_OIDC_ROOT_URL_STAGE || secrets.VITE_OIDC_ROOT_URL_PROD }}
          BASE_URL:          ${{ matrix.base_url }}
          SEND_SERVER_URL:   ${{ matrix.send_server_url }}
          SEND_CLIENT_URL:   ${{ matrix.send_client_url }}
        run: |
          echo "Environment: ${{ matrix.env }}"
          cd packages/send/frontend
          cat <<EOF > .env
          VUE_BASE_URL=${BASE_URL}
          VITE_SEND_SERVER_URL=${SEND_SERVER_URL}
          VITE_SEND_CLIENT_URL=${SEND_CLIENT_URL}
          VITE_SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
          VITE_SENTRY_DSN=${SENTRY_DSN}
          VITE_POSTHOG_PROJECT_KEY=${POSTHOG_KEY}
          VITE_POSTHOG_HOST=${POSTHOG_HOST}
          VITE_OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
          VITE_OIDC_ROOT_URL=${OIDC_ROOT_URL}
          EOF

      - name: Build frontend assets
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        id: frontend-build
        env:
          BASE_URL: ${{ matrix.base_url }}
          IS_CI_AUTOMATION: yes
        run: |
          echo "Building for environment: ${{ matrix.env }}"
          set -x
          # Initial setup of dependencies
          pnpm install --filter @thunderbird/tbpro-add-on && lerna run bootstrap
          pnpm install --filter tbpro-shared
          pnpm install --filter send-frontend
          cd packages/send/frontend

          # Build static frontend assets and the .xpi
          pnpm build
          mv dist-web ../dist-web-${{ matrix.env }}
          cd ..
          mv "$(find send-suite-*.xpi)" "send-suite-${{ matrix.env }}-$(basename "$(find send-suite-*.xpi)" | cut -d'-' -f3-)"

          ls -l send-suite-${{ matrix.env }}-*.xpi

      - name: Archive the ${{ matrix.env }} frontend build
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        id: frontend-archive-stage
        uses: actions/upload-artifact@v4
        with:
          name: dist-web-${{ matrix.env }}
          path: packages/send/dist-web-${{ matrix.env }}
          compression-level: 0

      - name: Archive the ${{ matrix.env }} XPI
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        id: xpi-archive-stage
        uses: actions/upload-artifact@v4
        with:
          name: xpi-${{ matrix.env }}
          path: packages/send/send-suite-${{ matrix.env }}-*.xpi

  frontend-deploy-stage-aws:
    needs: frontend-build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    environment: send-stage
    steps:
      - uses: actions/checkout@v4

      - name: Test echo
        run: |
          echo "Deploying frontend to AWS for environment ${{ matrix.env }}"
          echo $(date)

      - name: Download frontend-archive-stage artifact
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist-web-stage
          path: frontend-source

      - name: Configure AWS credentials
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy to stage
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        id: frontend-deploy
        run: |
          cd frontend-source
          aws s3 cp . s3://tb-send-suite-stage-frontend/ --recursive
          echo "s3_deployed=true" >> $GITHUB_OUTPUT


  frontend-invalidate-stage-cdn:
    needs: [frontend-deploy-stage-aws, backend-deploy-stage-aws]
    runs-on: ubuntu-latest
    environment: send-stage
    steps:
      - name: Test echo
        run: |
          echo "Invalidating CDN for stage environment"
          echo $(date)

      - name: Configure AWS credentials
        # if: needs.detect-changes.outputs.frontend-changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Invalidate CDN, stage only
        # if: needs.frontend-deploy-stage-aws.outputs.s3_deployed == 'true'
        run: |
          echo "Invalidating CDN for environment: ${{ matrix.env }}"
          # # Invalidate the CDN
          aws cloudfront create-invalidation --distribution-id ${{ vars.PROD_CF_DISTRO_ID }} --paths "/*"

  addon-changes:
    needs: detect-changes
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/cached-devcontainer:latest
    env:
      IS_CI_AUTOMATION: yes
    if: needs.detect-changes.outputs.addon-changed == 'true' || needs.detect-changes.outputs.frontend-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      # Build steps
      - name: (Send) Create production .env file from secrets
        run: |
          cd packages/send/frontend
          cat << EOF > .env
          VUE_BASE_URL=https://send-stage.tb.pro
          VITE_SEND_SERVER_URL=https://send-backend-stage.tb.pro
          VITE_SEND_CLIENT_URL=https://send-stage.tb.pro
          VITE_SENTRY_AUTH_TOKEN=${{ secrets.VITE_SENTRY_AUTH_TOKEN_PROD }}
          VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN_PROD }}
          VITE_POSTHOG_PROJECT_KEY=${{ secrets.VITE_POSTHOG_PROJECT_KEY_PROD }}
          VITE_POSTHOG_HOST=${{ vars.VITE_POSTHOG_HOST_PROD }}
          VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID_PROD }}
          VITE_OIDC_ROOT_URL=${{ secrets.VITE_OIDC_ROOT_URL_PROD }}                    
          EOF

      - name: (Addon) Create stage .env file from secrets
        run: |
          cd packages/addon
          cat << EOF > .env
          VUE_BASE_URL=https://send-stage.tb.pro
          VITE_SEND_SERVER_URL=https://send-backend-stage.tb.pro
          VITE_SEND_CLIENT_URL=https://send-stage.tb.pro
          VITE_SENTRY_AUTH_TOKEN=${{ secrets.VITE_SENTRY_AUTH_TOKEN_PROD }}
          VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN_PROD }}
          VITE_POSTHOG_PROJECT_KEY=${{ secrets.VITE_POSTHOG_PROJECT_KEY_PROD }}
          VITE_POSTHOG_HOST=${{ vars.VITE_POSTHOG_HOST_PROD }}
          VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID_PROD }}
          VITE_OIDC_ROOT_URL=${{ secrets.VITE_OIDC_ROOT_URL_PROD }}                    
          EOF

      - name: Build the stage frontend's static assets
        id: frontend-build-stage
        env:
          BASE_URL: https://send-stage.tb.pro
          IS_CI_AUTOMATION: yes
        run: |
          # install packages that addon depends on
          pnpm install --filter tbpro-shared
          pnpm install --filter addon
          pnpm install --filter send-frontend

          lerna run build --scope=addon

          cd packages/addon

          mv "$(find tbpro-addon-*.xpi)" "tbpro-addon-stage-$(basename "$(find tbpro-addon-*.xpi)" | cut -d'-' -f3-)"

      - name: Archive the stage XPI
        id: xpi-archive-stage
        uses: actions/upload-artifact@v4
        with:
          name: addon-xpi-stage
          path: packages/addon/tbpro-addon-stage-*.xpi

      - name: Deploy to ATN
        continue-on-error: true
        id: xpi-deploy
        env:
          ATN_API_KEY: "${{ secrets.ATN_API_KEY }}"
          ATN_API_SECRET: "${{ secrets.ATN_API_SECRET }}"
          BASE_URL: https://send-stage.tb.pro
        run: |
          cd packages/addon
          pnpm deploy-xpi $(find .. -name 'tbpro-addon-stage-*.xpi')

      - name: (Addon) Create prod .env file from secrets
        run: |
          cd packages/addon
          cat << EOF > .env
          VUE_BASE_URL=https://send.tb.pro
          VITE_SEND_SERVER_URL=https://send-backend.tb.pro
          VITE_SEND_CLIENT_URL=https://send.tb.pro
          VITE_SENTRY_AUTH_TOKEN=${{ secrets.VITE_SENTRY_AUTH_TOKEN_PROD }}
          VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN_PROD }}
          VITE_POSTHOG_PROJECT_KEY=${{ secrets.VITE_POSTHOG_PROJECT_KEY_PROD }}
          VITE_POSTHOG_HOST=${{ vars.VITE_POSTHOG_HOST_PROD }}
          VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID_PROD }}
          VITE_OIDC_ROOT_URL=${{ secrets.VITE_OIDC_ROOT_URL_PROD }}                  
          EOF

      - name: Build the prod frontend's static assets
        id: frontend-build-prod
        env:
          BASE_URL: https://send.tb.pro
          IS_CI_AUTOMATION: yes
        run: |
          # install packages that addon depends on
          pnpm install --filter tbpro-shared
          pnpm install --filter addon
          pnpm install --filter send-frontend

          lerna run build --scope=addon

          cd packages/addon
          # Delete any existing stage XPI to avoid confusion
          rm -f tbpro-addon-stage-*.xpi
          mv "$(find tbpro-addon-*.xpi)" "tbpro-addon-prod-$(basename "$(find tbpro-addon-*.xpi)" | cut -d'-' -f3-)"

      - name: Archive the prod XPI
        id: xpi-archive-prod
        uses: actions/upload-artifact@v4
        with:
          name: addon-xpi-prod
          path: packages/addon/tbpro-addon-prod-*.xpi
