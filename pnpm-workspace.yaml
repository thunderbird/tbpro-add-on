packages:
  - packages/send
  - packages/send/backend
  - packages/send/frontend
  - packages/send/e2e
  - packages/addon

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@sentry/profiling-node': true
  aws-sdk: true
  core-js: true
  esbuild: true
  msw: true
  nx: true
  prisma: true
  protobufjs: true
  vue-demi: true

injectWorkspacePackages: true

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - '@sentry/cli'
  - '@sentry/profiling-node'
  - aws-sdk
  - core-js
  - esbuild
  - msw
  - nx
  - prisma
  - protobufjs
  - vue-demi

overrides:
  '@opentelemetry/core@<2.8.0': '>=2.8.0'
  axios@>=1.0.0 <1.15.1: '>=1.15.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  axios@>=1.0.0 <1.16.0: '>=1.16.0'
  axios@>=1.7.0 <1.16.0: '>=1.16.0'
  brace-expansion@>=4.0.0 <5.0.5: '>=5.0.5'
  brace-expansion@>=5.0.0 <5.0.6: '>=5.0.6'
  esbuild@>=0.27.3 <0.28.1: '>=0.28.1'
  follow-redirects@<=1.15.11: '>=1.16.0'
  form-data@>=4.0.0 <4.0.6: '>=4.0.6'
  js-yaml@>=4.0.0 <=4.1.1: '>=4.2.0'
  protobufjs@>=8.0.0 <=8.5.0: '>=8.6.0'
  qs@>=6.11.1 <=6.15.1: '>=6.15.2'
  tar@<=7.5.15: '>=7.5.16'
  tmp@<0.2.6: '>=0.2.6'
  uuid@<11.1.1: '>=11.1.1'
  vite@<=6.4.2: '>=6.4.3'
  ws@>=8.0.0 <8.20.1: '>=8.20.1'
  ws@>=8.0.0 <8.21.0: '>=8.21.0'
  yaml@>=2.0.0 <2.8.3: '>=2.8.3'
