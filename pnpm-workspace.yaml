packages:
  - packages/send
  - packages/send/backend
  - packages/send/frontend
  - packages/send/e2e
  - packages/addon

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@sentry/profiling-node': true
  aws-sdk: true
  core-js: true
  esbuild: true
  msw: true
  nx: true
  prisma: true
  protobufjs: true
  vue-demi: true

injectWorkspacePackages: true

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - '@sentry/cli'
  - '@sentry/profiling-node'
  - aws-sdk
  - core-js
  - esbuild
  - msw
  - nx
  - prisma
  - protobufjs
  - vue-demi

