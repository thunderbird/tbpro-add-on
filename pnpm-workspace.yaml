packages:
  - packages/send
  - packages/send/backend
  - packages/send/frontend
  - packages/send/e2e
  - packages/addon

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@scarf/scarf": true
  "@sentry/cli": true
  "@sentry/profiling-node": true
  aws-sdk: true
  core-js: true
  esbuild: true
  msw: true
  nx: true
  prisma: true
  protobufjs: true
  vue-demi: true

injectWorkspacePackages: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "@scarf/scarf"
  - "@sentry/cli"
  - "@sentry/profiling-node"
  - aws-sdk
  - core-js
  - esbuild
  - msw
  - nx
  - prisma
  - protobufjs
  - vue-demi

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  axios@=1.15.2: ">=1.16.0"
  axios@>=1.0.0 <1.15.1: ">=1.15.1"
  axios@>=1.0.0 <1.15.2: ">=1.15.2"
  axios@>=1.0.0 <1.16.0: ">=1.16.0"
  brace-expansion@>=4.0.0 <5.0.5: ">=5.0.5"
  brace-expansion@>=5.0.0 <5.0.6: ">=5.0.6"
  fast-uri@<=3.1.0: ">=3.1.1"
  fast-uri@<=3.1.1: ">=3.1.2"
  fast-xml-builder@<=1.1.6: ">=1.1.7"
  fast-xml-builder@=1.1.5: ">=1.1.6"
  follow-redirects@<=1.15.11: ">=1.16.0"
  js-cookie@<=3.0.5: ">=3.0.7"
