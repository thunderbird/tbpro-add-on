packages:
  - packages/assist
  - packages/assist/frontend
  - packages/send
  - packages/send/backend
  - packages/send/frontend
  - packages/send/e2e
  - packages/addon

injectWorkspacePackages: true

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - '@sentry/cli'
  - '@sentry/profiling-node'
  - aws-sdk
  - core-js
  - esbuild
  - msw
  - nx
  - prisma
  - protobufjs
  - vue-demi

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@sentry/profiling-node': true
  aws-sdk: true
  core-js: true
  esbuild: true
  msw: true
  nx: true
  prisma: true
  protobufjs: true
  vue-demi: true

overrides:
  '@tootallnate/once@<3.0.1': '>=3.0.1'
  axios@>=1.0.0 <1.15.1: '>=1.15.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  brace-expansion@>=4.0.0 <5.0.5: '>=5.0.5'
  fast-uri@<=3.1.0: '>=3.1.1'
  fast-uri@<=3.1.1: '>=3.1.2'
  fast-xml-builder@<=1.1.6: '>=1.1.7'
  fast-xml-builder@=1.1.5: '>=1.1.6'
  follow-redirects@<=1.15.11: '>=1.16.0'
  uuid@<14.0.0: '>=14.0.0'
  yaml@>=2.0.0 <2.8.3: '>=2.8.3'
